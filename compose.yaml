services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - path: .env
        required: false
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis
  redis:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
volumes:
  redis-data:
