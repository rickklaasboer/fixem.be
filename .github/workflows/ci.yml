name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Lint & format (biome)
        run: bunx biome ci .
      - name: Typecheck
        run: bunx tsc --noEmit
      - name: Test
        run: bun test

  # On pushes to main only, publish a moving `edge` image + an immutable
  # `sha-<short>` image. Tagged releases are handled by release.yml.
  image:
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      security-events: write
    uses: ./.github/workflows/build-image.yml
    secrets: inherit
