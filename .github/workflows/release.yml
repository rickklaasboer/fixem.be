name: Release

# Manual release. Runs the CI gate, then release-it derives the next version
# from conventional commits, updates CHANGELOG.md, tags vX.Y.Z, and cuts a
# GitHub Release. The versioned image is built in the same run (a tag pushed
# with GITHUB_TOKEN would not trigger a separate tag-listening workflow).
on:
  workflow_dispatch:
    inputs:
      increment:
        description: "Version bump (auto = derive from conventional commits)"
        required: true
        default: auto
        type: choice
        options: [auto, patch, minor, major]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.out.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # release-it needs full history + tags
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

      - name: Lint & format (biome)
        run: bunx biome ci .
      - name: Typecheck
        run: bunx tsc --noEmit
      - name: Test
        run: bun test

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: release-it
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ inputs.increment }}" = "auto" ]; then
            bunx release-it --ci
          else
            bunx release-it "${{ inputs.increment }}" --ci
          fi

      - name: Capture released version
        id: out
        run: echo "version=v$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

  image:
    needs: release
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      security-events: write
    uses: ./.github/workflows/build-image.yml
    with:
      release_tag: ${{ needs.release.outputs.version }}
    secrets: inherit
