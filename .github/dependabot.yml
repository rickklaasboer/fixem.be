version: 2
updates:
  # Bun / npm dependencies (reads package.json + bun.lock).
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore

  # Pinned GitHub Actions versions.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
